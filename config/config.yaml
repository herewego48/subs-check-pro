# -----------进度显示-----------
print-progress: true
progress-mode: "auto"

# -----------计划任务-----------
# GitHub Actions 中由 Actions 调度，程序启动后立即执行一次检测
# check-interval 设为 0 表示不循环，检测完即进入空闲
cron-expression: ""
check-interval: 0

# -----------检测参数-----------
alive-concurrent: 200
speed-concurrent: 16
media-concurrent: 100

ipv6: false
timeout: 6000
concurrent: 10
success-limit: 20
keep-success-proxies: true

# -----------下载参数-----------
min-speed: 512
download-timeout: 10
download-mb: 20
total-speed-limit: 0
speed-test-url: "random"
threshold: 0.75
gc-threshold: 20000

# -----------版本更新-----------
# Actions 环境中关闭自动更新
update: false
update-on-startup: false
cron-check-update: ""
prerelease: false
update-timeout: 5

# -----------WebUI-----------
# Actions 环境中不需要 WebUI，但保留配置以防万一
listen-port: ":8199"
enable-web-ui: false
api-key: "DgX7Htd1XO"
share-password: ""

# -----------SUB-STORE-----------
# Actions 环境中关闭 sub-store
sub-store-port: ""
sub-store-path: ""
mihomo-overwrite-url: ""

sub-process:
  resolve-domain: false
  node-split: false
  sub-info: false
  regex-filter-keep: true
  regex-filter: []
  regex-sort: []

singbox-latest:
  version: "1.12"
  json: "https://raw.githubusercontent.com/sinspired/sub-store-template/main/1.12.x/sing-box.json"
  js: "https://raw.githubusercontent.com/sinspired/sub-store-template/main/1.12.x/sing-box.js"

singbox-old:
  version: "1.11"
  json: "https://raw.githubusercontent.com/sinspired/sub-store-template/main/1.11.x/sing-box.json"
  js: "https://raw.githubusercontent.com/sinspired/sub-store-template/main/1.11.x/sing-box.js"

sub-store-sync-cron: ""
sub-store-produce-cron: ""
sub-store-push-service: ""

# -----------节点处理-----------
rename-node: true
node-prefix: ""

node-type:
  - vmess
  - vless
  - trojan
  - ss
  - ssr

node-loc: []
drop-bad-cf-nodes: false
isp-check: false
media-check: false
media-check-timeout: 5
platforms:
  - iprisk
  - youtube
  - x
enhanced-tag: true
maxmind-db-path: ""
callback-script: ""

# -----------通知设置-----------
apprise-api-server: "https://apprise.linkpc.dpdns.org/notify"
recipient-url: []
notify-title: "🔔 节点状态更新"

# -----------存储参数-----------
output-dir: ""
save-method: "local"

# webdav
webdav-url: ""
webdav-username: ""
webdav-password: ""

# gist
github-gist-id: ""
github-token: ""
github-api-mirror: ""

# r2
worker-url: ""
worker-token: ""

# s3
s3-endpoint: "127.0.0.1:9000"
s3-access-id: ""
s3-secret-key: ""
s3-bucket: ""
s3-use-ssl: false
s3-bucket-lookup: "auto"

