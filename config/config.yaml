name: Subs Check Pro

on:
  schedule:
    # 北京时间 17:00 = UTC 09:00
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    name: 运行节点检测
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 启动 subs-check-pro 容器
        run: |
          docker run -d --name scp \
            -v ${{ github.workspace }}/config:/app/config \
            -v ${{ github.workspace }}/output:/app/output \
            -e TZ=Asia/Shanghai \
            -e API_KEY="DgX7Htd1XO" \
            -p 8199:8199 \
            -p 8299:8299 \
            ghcr.io/sinspired/subs-check-pro:latest

      - name: 等待检测完成
        timeout-minutes: 50
        run: |
          echo "等待检测输出文件生成..."
          for i in $(seq 1 100); do
            if find output/ -name '*.yaml' -type f 2>/dev/null | grep -q .; then
              echo "[$i] 检测到输出文件，等待写入稳定..."
              sleep 120
              BEFORE=$(find output/ -name '*.yaml' -type f | wc -l)
              sleep 60
              AFTER=$(find output/ -name '*.yaml' -type f | wc -l)
              if [ "$BEFORE" = "$AFTER" ]; then
                echo "文件数量稳定 ($BEFORE 个 yaml)，检测完成"
                break
              fi
              echo "仍有新文件生成，继续等待..."
            else
              echo "[$i] 等待中... (30s)"
            fi
            sleep 30
          done

      - name: 生成 Mihomo/Clash 订阅（带分流规则）
        run: |
          SUB_STORE_PATH="UvPl4GLQBvYjs3iLdrFZ"
          MIHOMO_URL="http://127.0.0.1:8299/${SUB_STORE_PATH}/api/file/mihomo"
          OUTPUT_DIR="${{ github.workspace }}/output/sub"

          echo "等待 Sub-Store 服务就绪..."
          for i in $(seq 1 20); do
            if curl -sf "http://127.0.0.1:8299/${SUB_STORE_PATH}/" >/dev/null 2>&1; then
              echo "Sub-Store 已就绪"
              break
            fi
            echo "[$i] 等待 Sub-Store 启动... (5s)"
            sleep 5
          done

          echo "正在生成 Mihomo/Clash 订阅: ${MIHOMO_URL}"
          mkdir -p "${OUTPUT_DIR}"
          HTTP_CODE=$(curl -sf -o "${OUTPUT_DIR}/mihomo.yaml" -w "%{http_code}" "${MIHOMO_URL}" 2>&1) || true
          echo "HTTP 状态码: ${HTTP_CODE}"

          if [ "${HTTP_CODE}" = "200" ]; then
            echo "Mihomo 订阅生成成功"
            echo "=== 文件大小 ==="
            ls -lh "${OUTPUT_DIR}/mihomo.yaml"
            echo "=== 前 30 行预览 ==="
            head -30 "${OUTPUT_DIR}/mihomo.yaml"
          else
            echo "Mihomo 订阅生成失败，尝试备用地址..."
            curl -sf -o "${OUTPUT_DIR}/mihomo.yaml" "http://127.0.0.1:8299/api/file/mihomo" 2>&1 || \
              echo "备用地址也失败"
          fi

      - name: 查看检测结果
        if: always()
        run: |
          echo "=== output 目录 ==="
          ls -lhR output/ 2>/dev/null || echo "(空)"
          echo ""
          echo "=== 容器日志 (末尾 80 行) ==="
          docker logs --tail 80 scp 2>/dev/null || true

      - name: 停止容器
        if: always()
        run: docker stop scp 2>/dev/null; docker rm scp 2>/dev/null || true

      - name: 上传检测结果 (Artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: output-${{ github.run_number }}
          path: output/
          retention-days: 30

      - name: 提交输出文件到仓库
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f output/ || true
          git diff --cached --quiet || git commit -m "chore: 更新检测结果 $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push || echo "No changes to push"
